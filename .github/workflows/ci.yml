name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-14 dropped from CI until the test-disk generator has a
        # non-docker path (see qemu-based generator backlog item). The
        # release workflow still builds the universal macOS lib on
        # macos-14 — that path doesn't regenerate fixtures.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate test disks
        run: |
          if [ -x ./test-disks/gen-test-disks.sh ]; then
            ./test-disks/gen-test-disks.sh
          fi
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --release
