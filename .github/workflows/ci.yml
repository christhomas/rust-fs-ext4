name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate test disks
        run: |
          if [ -x ./test-disks/gen-test-disks.sh ]; then
            ./test-disks/gen-test-disks.sh
          fi
      - run: cargo fmt --check
      # Clippy is informational for v0.1.0 — see CHANGELOG known-issues.
      # Tighten to `-D warnings` once the initial lint backlog is cleared.
      - run: cargo clippy --all-targets || true
      - run: cargo test --release
